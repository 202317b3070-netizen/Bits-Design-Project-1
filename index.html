<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | India Real Estate Analyzer</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#111827;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.14);
      --text: #e2e8f0;
      --dim: #94a3b8;
      --accent: #3b82f6;
    }

    body{
      min-height:100vh;
      margin:0;
      color: var(--text);
      background:
        radial-gradient(1000px 600px at 20% 10%, rgba(59,130,246,0.30), transparent 55%),
        radial-gradient(900px 500px at 90% 20%, rgba(16,185,129,0.22), transparent 55%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      display:grid;
      place-items:center;
      overflow-x:hidden;
    }

    .login-wrap{
      width: min(980px, 92vw);
      display:grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 18px;
      align-items: stretch;
    }

    @media (max-width: 992px){
      .login-wrap{ grid-template-columns: 1fr; }
    }

    .panel{
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(0,0,0,0.35);
      overflow:hidden;
    }

    .left{
      padding: 26px;
      position: relative;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom: 14px;
    }
    .brand .logo{
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(59,130,246,0.18);
      border: 1px solid rgba(59,130,246,0.28);
      display:grid;
      place-items:center;
      font-size: 22px;
    }
    .brand h1{
      font-size: 18px;
      margin: 0;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .brand p{
      margin:0;
      color: var(--dim);
      font-size: 12px;
    }

    .feature{
      margin-top: 18px;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.18);
    }
    .feature .kicker{
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(148,163,184,0.95);
      font-weight: 700;
    }
    .feature ul{
      margin: 10px 0 0 0;
      padding-left: 18px;
      color: rgba(226,232,240,0.95);
      font-size: 13px;
      line-height: 1.6;
    }

    .right{
      padding: 26px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap: 14px;
    }

    .title{
      margin: 0;
      font-size: 20px;
      font-weight: 800;
    }
    .subtitle{
      margin: 0;
      font-size: 13px;
      color: var(--dim);
    }

    .form-label{
      font-size: 12px;
      font-weight: 700;
      color: rgba(226,232,240,0.85);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .form-control{
      background: rgba(0,0,0,0.22) !important;
      color: #fff !important;
      border: 1px solid rgba(255,255,255,0.14) !important;
      border-radius: 12px !important;
      padding: 12px 12px !important;
    }
    .form-control:focus{
      box-shadow: 0 0 0 0.2rem rgba(59,130,246,.18) !important;
      border-color: rgba(59,130,246,0.55) !important;
    }

    .btn-primary{
      border-radius: 12px;
      padding: 11px 12px;
      font-weight: 800;
      background: var(--accent);
      border-color: rgba(59,130,246,0.55);
    }
    .btn-primary:hover{
      background: #2563eb;
      border-color: rgba(37,99,235,0.75);
    }

    .small-note{
      font-size: 12px;
      color: var(--dim);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.18);
      font-size: 12px;
      color: rgba(226,232,240,0.90);
    }

    .muted-link{
      color: rgba(148,163,184,0.95);
      text-decoration: none;
    }
    .muted-link:hover{ color:#cbd5e1; text-decoration: underline; }
  </style>
</head>

<body>

<div class="login-wrap" style="grid-template-columns: 1fr 1fr; max-width: 900px;">

  <!-- LEFT: SIGN UP -->
  <div class="panel right">
    <h5 class="mb-2 fw-bold">Create account</h5>
    <p class="small-note mb-3">New here? Create an account to save likes & history.</p>

    <label class="form-label">Email</label>
    <input id="signupEmail" type="email" class="form-control" placeholder="newuser@example.com">

    <label class="form-label mt-2">Password</label>
    <input id="signupPassword" type="password" class="form-control" placeholder="Create password">

    <button class="btn btn-primary w-100 mt-3" onclick="signup()">Create Account</button>
  </div>

  <!-- RIGHT: LOGIN -->
  <div class="panel right">
    <h5 class="mb-1 fw-bold">Sign in</h5>
    <p class="small-note mb-3">
      New user? Create an account • Existing user? Sign in • Exploring? Guest mode
    </p>

    <label class="form-label">Email</label>
    <input id="email" type="email" class="form-control" placeholder="name@example.com">

    <label class="form-label mt-2">Password</label>
    <input id="password" type="password" class="form-control" placeholder="Enter password">

    <div class="form-check mt-2">
      <input class="form-check-input" type="checkbox" id="rememberMe" checked>
      <label class="form-check-label small-note">Remember me</label>
    </div>

    <button class="btn btn-primary w-100 mt-3" onclick="login()">Login</button>

    <div class="d-grid gap-2 mt-2">
      <button class="btn btn-outline-light" onclick="demoLogin()">Try Demo</button>
      <button class="btn btn-outline-secondary" onclick="continueAsGuest()">Continue as Guest</button>
    </div>
  </div>

</div>


  <script>
    /**
     * DEMO LOGIN (Front-end only)
     * Works well for Vite + Vercel static projects.
     */
    // ==========================
// USER STORAGE (REGISTERED ACCOUNTS)
// ==========================
function loadUsers() {
  return JSON.parse(localStorage.getItem("appUsers") || "{}");
}

function saveUsers(users) {
  localStorage.setItem("appUsers", JSON.stringify(users));
}

// Demo-only hashing (better than plain text; still not secure without backend)
async function hashPassword(password) {
  const enc = new TextEncoder().encode(password);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}
    const DEMO_USER = { email: "test@example.com", password: "1234" };

    // If user already logged in, go straight to app
    (function autoRedirectIfLoggedIn(){
      const user = localStorage.getItem("loggedInUser");
      if (user) window.location.href = "/app.html";
    })();

    // Show last login hint on login page if known
    (function showLastLoginHint(){
      const rememberedEmail = localStorage.getItem("rememberedEmail");
      const hint = document.getElementById("lastLoginHint");
      if (!hint) return;

      if (rememberedEmail) {
        document.getElementById("email").value = rememberedEmail;
        const last = localStorage.getItem(`lastLogin_${rememberedEmail}`);
        if (last) {
          hint.innerHTML = `Last login for <b>${rememberedEmail}</b>: <b>${new Date(last).toLocaleString()}</b>`;
        }
      }
    })();

    function showError(msg){
      const box = document.getElementById("alertBox");
      box.textContent = msg;
      box.classList.remove("d-none");
    }

    function clearError(){
      const box = document.getElementById("alertBox");
      box.classList.add("d-none");
      box.textContent = "";
    }

    function demoFill(e){
      e.preventDefault();
      document.getElementById("email").value = DEMO_USER.email;
      document.getElementById("password").value = DEMO_USER.password;
      clearError();
    }

    async function login() {
  clearError();

  const email = (document.getElementById("email").value || "").trim().toLowerCase();
  const pass = (document.getElementById("password").value || "");

  if (!email || !pass) return showError("Please enter email and password.");

  const users = loadUsers();
  if (!users[email]) {
    return showError("No account found. Please create a new account (Sign up) or use Demo/Guest.");
  }

  const hash = await hashPassword(pass);
  if (hash !== users[email].hash) {
    return showError("Incorrect password. Please try again.");
  }

  // Remember login session
  localStorage.setItem("loggedInUser", email);
  localStorage.removeItem("guestMode");

  // Track last login + previous login for session
  const keyLast = `lastLogin_${email}`;
  const previous = localStorage.getItem(keyLast);
  const now = new Date().toISOString();
  localStorage.setItem(keyLast, now);

  if (previous) localStorage.setItem("previousLoginForSession", previous);
  else localStorage.removeItem("previousLoginForSession");

  // History (last 5)
  const histKey = `loginHistory_${email}`;
  const hist = JSON.parse(localStorage.getItem(histKey) || "[]");
  hist.unshift(now);
  localStorage.setItem(histKey, JSON.stringify(hist.slice(0, 5)));

  window.location.href = "/app.html";
}
      // demo validation
      // Basic email validation only
const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if (!emailPattern.test(email)) {
  return showError("Please enter a valid email address.");
}

// Optional: password rule (not validated against database)
if (pass.length < 3) {
  return showError("Password should be at least 3 characters.");
}
    async function signup() {
  clearError();

  const email = (document.getElementById("signupEmail").value || "").trim().toLowerCase();
  const pass = (document.getElementById("signupPassword").value || "");

  if (!email || !pass) return showError("Please enter email and password to sign up.");
  if (pass.length < 4) return showError("Password must be at least 4 characters.");

  const users = loadUsers();
  if (users[email]) return showError("Account already exists. Please login instead.");

  users[email] = {
    hash: await hashPassword(pass),
    createdAt: new Date().toISOString()
  };
  saveUsers(users);

  // Auto-login after signup
  localStorage.setItem("loggedInUser", email);
  localStorage.removeItem("guestMode");
  localStorage.removeItem("previousLoginForSession");

  // Set first login time
  localStorage.setItem(`lastLogin_${email}`, new Date().toISOString());

  window.location.href = "/app.html";
}

async function demoLogin() {
  clearError();

  const email = "test@example.com";
  const pass = "1234";

  // Ensure demo account exists in appUsers
  const users = loadUsers();
  if (!users[email]) {
    users[email] = { hash: await hashPassword(pass), createdAt: new Date().toISOString() };
    saveUsers(users);
  }

  // Login as demo
  localStorage.setItem("loggedInUser", email);
  localStorage.removeItem("guestMode");

  const keyLast = `lastLogin_${email}`;
  const previous = localStorage.getItem(keyLast);
  const now = new Date().toISOString();
  localStorage.setItem(keyLast, now);

  if (previous) localStorage.setItem("previousLoginForSession", previous);
  else localStorage.removeItem("previousLoginForSession");

  window.location.href = "/app.html";
}

function continueAsGuest() {
  clearError();
  localStorage.removeItem("loggedInUser");
  localStorage.removeItem("previousLoginForSession");
  localStorage.setItem("guestMode", "1");
  window.location.href = "/app.html";
}

      // Mark session as logged in
      localStorage.setItem("loggedInUser", email);

      // Track last login time + previous for this session
      const keyLast = `lastLogin_${email}`;
      const previous = localStorage.getItem(keyLast);

      const now = new Date().toISOString();
      localStorage.setItem(keyLast, now);

      if (previous) localStorage.setItem("previousLoginForSession", previous);
      else localStorage.removeItem("previousLoginForSession");

      // Store history (last 5)
      const histKey = `loginHistory_${email}`;
      const hist = JSON.parse(localStorage.getItem(histKey) || "[]");
      hist.unshift(now);
      localStorage.setItem(histKey, JSON.stringify(hist.slice(0,5)));

      // Go to dashboard page
      window.location.href = "/app.html";
    }
  </script>

</body>
</html>
