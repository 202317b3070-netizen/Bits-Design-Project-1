<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - India Real Estate Analyzer</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 60%);
      display: grid;
      place-items: center;
    }
    .card {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      color: #e2e8f0;
      border-radius: 18px;
    }
    .form-control {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
    }
    .form-control:focus {
      background: rgba(0,0,0,0.25);
      color: #fff;
      border-color: #3b82f6;
      box-shadow: 0 0 0 0.2rem rgba(59,130,246,.25);
    }
    .small-note { color: #94a3b8; font-size: 12px; }
  </style>
</head>

<body>
  <div class="container px-3">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card p-4 shadow-lg">
          <div class="d-flex align-items-center gap-2 mb-3">
            <span class="fs-3">🏠</span>
            <div>
              <h5 class="mb-0">India Real Estate Analyzer</h5>
              <div class="small-note">Sign in to continue</div>
            </div>
          </div>

          <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="email" type="email" class="form-control" placeholder="name@example.com">
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input id="password" type="password" class="form-control" placeholder="Enter password">
          </div>

          <button class="btn btn-primary w-100" onclick="login()">Login</button>

          <div class="mt-3 small-note">
            Demo credentials: <b>test@example.com</b> / <b>1234</b>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Demo-only credentials (simple local login)
    const DEMO_USER = { email: "test@example.com", password: "1234" };

    function showError(msg){
      const box = document.getElementById("alertBox");
      box.textContent = msg;
      box.classList.remove("d-none");
    }

    function login(){
      const email = document.getElementById("email").value.trim().toLowerCase();
      const pass  = document.getElementById("password").value;

      if(!email || !pass) return showError("Please enter email and password.");

      if(email !== DEMO_USER.email || pass !== DEMO_USER.password){
        return showError("Invalid credentials. Try demo credentials.");
      }

      // Login ok
      localStorage.setItem("loggedInUser", email);

      // Last login tracking
      const keyLast = `lastLogin_${email}`;
      const previous = localStorage.getItem(keyLast);

      const now = new Date().toISOString();
      localStorage.setItem(keyLast, now);

      // Store session previous login (for display in index.html)
      if(previous) localStorage.setItem("previousLoginForSession", previous);
      else localStorage.removeItem("previousLoginForSession");

      // History (keep last 5)
      const histKey = `loginHistory_${email}`;
      const hist = JSON.parse(localStorage.getItem(histKey) || "[]");
      hist.unshift(now);
      localStorage.setItem(histKey, JSON.stringify(hist.slice(0,5)));

      // go to your app
      window.location.href = "/app.html";
    }
  </script>
</body>
</html>
