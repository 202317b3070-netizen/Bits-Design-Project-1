<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | India Real Estate Analyzer</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- Background animation -->
  <div class="bg-blobs">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
  </div>

  <main class="container h-100 d-flex align-items-center justify-content-center">
    <div class="login-card shadow-lg">
      <div class="text-center mb-4">
        <!-- Your Logo -->
        <img src="./public/assets/logo.png" class="logo-img" alt="App Logo">
        <h1 class="h4 mt-3 mb-1">India Real Estate Analyzer</h1>
        <p class="text-muted small mb-0">Login with your email to continue</p>
      </div>

      <form id="loginForm" class="needs-validation" novalidate>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input id="email" type="email" class="form-control" placeholder="name@example.com" required />
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>

        <div class="d-grid gap-2">
          <button class="btn btn-primary btn-lg" type="submit">
            Continue
          </button>
          <button id="guestBtn" class="btn btn-outline-light" type="button">
            Continue as Guest
          </button>
        </div>

        <div class="mt-3 small text-muted text-center">
          Demo login (no password). For real authentication, we can integrate Google/Microsoft sign-in.
        </div>
      </form>
    </div>
  </main>

  <script src="login.js"></script>
</body>
</html>
